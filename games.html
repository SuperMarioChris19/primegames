<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Games - Games</title>
    <link rel="icon" type="image/x-icon" href="icon.ico">
    
    <style>
        /* Shared Base Styles */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { display: flex; background-color: #121214; color: #ffffff; min-height: 100vh; overflow-x: hidden; }
        
        /* Sidebar Styling */
        .sidebar { width: 250px; background-color: #1a1a1e; display: flex; flex-direction: column; border-right: 2px solid #292930; position: fixed; height: 100vh; z-index: 10; }
        .sidebar-brand { padding: 20px; font-size: 24px; font-weight: bold; color: #ff4757; text-transform: uppercase; border-bottom: 2px solid #292930; }
        .sidebar-menu { list-style: none; padding: 20px 0; }
        .sidebar-menu li a { display: block; padding: 15px 25px; color: #a4a4a8; text-decoration: none; font-size: 18px; border-left: 4px solid transparent; }
        .sidebar-menu li a:hover, .sidebar-menu li a.active { color: #ffffff; background-color: #292930; border-left: 4px solid #ff4757; }
        
        /* Main Content */
        .main-content { margin-left: 250px; padding: 40px; width: calc(100% - 250px); transition: all 0.3s ease; }
        h1 { margin-bottom: 30px; font-size: 36px; }

        /* Games Grid Layout */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
        }

        .game-card {
            background-color: #1a1a1e;
            border: 2px solid #292930;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s, border-color 0.2s;
            cursor: pointer;
        }

        .game-card:hover {
            transform: translateY(-5px);
            border-color: #ff4757;
        }

        /* Image Thumbnail Container */
        .game-thumbnail {
            height: 150px;
            background-color: #292930;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Thumbnail Image Scaling Rules */
        .game-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .game-card:hover .game-thumbnail img {
            transform: scale(1.05);
        }

        .game-info {
            padding: 15px;
        }

        .game-title {
            font-size: 20px;
            margin-bottom: 8px;
            color: #ffffff;
        }

        .game-desc {
            font-size: 14px;
            color: #a4a4a8;
            line-height: 1.4;
        }

        /* Hidden Utility Class */
        .hidden { display: none !important; }

        /* Game Stage (Iframe Container) */
        #game-stage {
            margin-top: 20px;
            background-color: #1a1a1e;
            border: 2px solid #292930;
