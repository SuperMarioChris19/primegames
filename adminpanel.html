<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Games - Admin</title>
    <link rel="icon" type="image/x-icon" href="icon.ico">
    <style>
        /* Shared Base Styles */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { display: flex; background-color: #121214; color: #ffffff; min-height: 100vh; }
        
        /* Sidebar Styling (Matches Home) */
        .sidebar { width: 250px; background-color: #1a1a1e; display: flex; flex-direction: column; border-right: 2px solid #292930; position: fixed; height: 100vh; }
        .sidebar-brand { padding: 20px; font-size: 24px; font-weight: bold; color: #ff4757; text-transform: uppercase; border-bottom: 2px solid #292930; }
        .sidebar-menu { list-style: none; padding: 20px 0; }
        .sidebar-menu li a { display: block; padding: 15px 25px; color: #a4a4a8; text-decoration: none; font-size: 18px; border-left: 4px solid transparent; }
        .sidebar-menu li a:hover, .sidebar-menu li a.active { color: #ffffff; background-color: #292930; border-left: 4px solid #ff4757; }
        
        /* Main Content */
        .main-content { margin-left: 250px; padding: 40px; width: calc(100% - 250px); }
        h1 { margin-bottom: 20px; font-size: 36px; }

        /* Forms and Panels */
        .admin-card {
            background-color: #1a1a1e;
            border: 2px solid #292930;
            border-radius: 8px;
            padding: 30px;
            max-width: 600px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #a4a4a8;
            font-size: 14px;
        }

        input[type="password"], textarea {
            width: 100%;
            padding: 12px;
            background-color: #121214;
            border: 2px solid #292930;
            border-radius: 6px;
            color: #ffffff;
            font-size: 16px;
            transition: border-color 0.2s;
        }

        input[type="password"]:focus, textarea:focus {
            outline: none;
            border-color: #ff4757;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        button {
            background-color: #ff4757;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #ff2f43;
        }

        /* Hidden controls utility class */
        .hidden {
            display: none;
        }

        .status-msg {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="sidebar-brand">Prime Games</div>
        <ul class="sidebar-menu">
            <li><a href="index.html">Home</a></li>
            <li><a href="games.html">Games</a></li>
            <li><a href="adminpanel.html" class="active">Admin Panel</a></li>
        </ul>
    </nav>

    <main class="main-content">
        <h1>Global Admin Control</h1>
        
        <div id="auth-section" class="admin-card">
            <div class="form-group">
                <label for="admin-code">Enter Secret Admin Passcode</label>
                <input type="password" id="admin-code" placeholder="••••••••">
            </div>
            <button onclick="verifyAdminCode()">Unlock Panel</button>
            <p id="auth-error" class="status-msg" style="color: #ff4757;"></p>
        </div>

        <div id="control-section" class="admin-card hidden">
            <div class="form-group">
                <label for="new-announcement">Modify Global Announcement Banner</label>
                <textarea id="new-announcement" placeholder="Type a message to push to all users..."></textarea>
            </div>
            <button onclick="saveAnnouncement()">Broadcast Update</button>
            <p id="save-status" class="status-msg" style="color: #2ed573;"></p>
        </div>
    </main>

    <script>
        const PASSCODE = "Mikejacksonhehe123";

        // Decrypts the array back into the actual password string to check against user input
        function decryptPasscode(arr) {
            return arr.map((num, index) => {
                // Alternating algorithm logic to correctly extract letters vs numbers
                let offset = (index < 15) ? 43 : -36; 
                return String.fromCharCode(num + offset);
            }).join('');
        }

        function verifyAdminCode() {
            const inputCode = document.getElementById('admin-code').value;
            const errorElement = document.getElementById('auth-error');
            
            // Decrypt the secret key on the fly
            const correctPasscode = (PASSCODE);

            if (inputCode === correctPasscode) {
                // Reveal configuration elements, hide entry gate
                document.getElementById('auth-section').classList.add('hidden');
                document.getElementById('control-section').classList.remove('hidden');
                
                // Pre-populate the input area with current statement context
                document.getElementById('new-announcement').value = 
                    localStorage.getItem('globalAnnouncement') || "";
                errorElement.innerText = ""; 
            } else {
                errorElement.innerText = "Invalid passcode credentials. Try again.";
            }
        }

        function saveAnnouncement() {
            const contentText = document.getElementById('new-announcement').value;
            
            // Push updates directly to the browser storage
            localStorage.setItem('globalAnnouncement', contentText);
            
            const statusNotice = document.getElementById('save-status');
            statusNotice.innerText = "Success! Announcement deployed live.";
            
            // Fade notification message out after short delay
            setTimeout(() => { statusNotice.innerText = ""; }, 3000);
        }
    </script>
</body>
</html>
